# Single source of truth for the series catalog.
# SERIES.md is the human-readable summary; scripts/build_series_index.py will
# generate SERIES.md and mkdocs.yml nav from this file.
# status enum: planned | draft | ready | published | needs-update

meta:
  # GitHub coordinates used to build absolute URLs (commit-pinned) in:
  #   - .sisyphus/medium/to-medium.py     (Medium import-ready raw image URLs)
  #   - scripts/export_ebook_source.py    (ebook bundle cross-series + canonical links)
  #
  # `repo`: When the repo is renamed (Phase 9: tech-blog -> tech-writing), update
  # this AND re-run to-medium.py / export_ebook_source.py to regenerate artifacts.
  #
  # `published_ref`: IMMUTABLE publishing snapshot. All external-facing absolute
  # URLs (Medium raw images, ebook canonical/cross-series links) point here.
  # Bump only when publishing a new snapshot of the content; readers of already-
  # published Medium articles depend on this commit existing forever.
  #
  # `validated_ref`: optional internal tracking of "latest commit that passed
  # all gates". Not consumed by any URL builder. Useful for humans answering
  # "is published_ref behind master?". Update freely.
  repo: yeongseon/tech-writing
  published_ref: f24a126
  validated_ref: f24a126

