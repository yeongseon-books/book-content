name: content-pipeline

on:
  push:
    branches: [master]
    paths:
      - "content/**"
      - "series.yaml"
      - ".sisyphus/medium/**"
      - "scripts/**"
  pull_request:
    branches: [master]
    paths:
      - "content/**"
      - "series.yaml"
      - ".sisyphus/medium/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Check finalize-posts idempotency
        run: |
          python3 .sisyphus/medium/finalize-posts.py
          git diff --exit-code content/ || {
            echo "finalize-posts.py made changes — commit the updated files."
            exit 1
          }

      - name: Check Korean style
        run: bash .sisyphus/style/check-ko.sh

      - name: Verify series.yaml paths exist
        run: python3 scripts/check_catalog.py

      - name: Verify medium HTML artifacts
        run: python3 scripts/check_exports.py

      - name: Validate front matter
        run: python3 scripts/check_frontmatter.py

      - name: Lint image captions
        run: python3 scripts/lint_captions.py

      - name: Check internal links
        run: python3 scripts/check_links.py

      - name: Check article structure
        run: python3 scripts/check_article_structure.py

      - name: Build MkDocs (strict)
        run: |
          pip install -r requirements.txt
          python3 scripts/build_docs.py
          mkdocs build --strict
