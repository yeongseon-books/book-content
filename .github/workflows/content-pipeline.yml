name: content-pipeline

on:
  push:
    branches: [master]
    paths:
      - "content/**"
      - "series.yaml"
      - ".sisyphus/medium/**"
      - "scripts/**"
  pull_request:
    branches: [master]
    paths:
      - "content/**"
      - "series.yaml"
      - ".sisyphus/medium/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate content, generated outputs, and links
        run: make check

      - name: Build MkDocs (strict)
        run: make docs-build
