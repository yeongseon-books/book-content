site_name: Book Content
site_description: 영선북스의 기술서, 웹북, 블로그 시리즈 원고를 관리하는 canonical content repository.
site_author: Yeongseon Choe

# docs/ is generated from content/ by scripts/build_docs.py before `mkdocs build`.
docs_dir: docs

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

# nav is managed by scripts/build_series_index.py from series.yaml (single owner).
# scripts/build_docs.py materializes content/ -> docs/ files; it does not touch nav.
