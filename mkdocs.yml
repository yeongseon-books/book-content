site_name: Tech Writing
site_description: Technical writing source for blog posts, MkDocs web books, and eBook publishing.
site_author: Yeongseon Choe

# docs/ is generated from content/ by scripts/build_docs.py before `mkdocs build`.
docs_dir: docs

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

# nav is rewritten by scripts/build_series_index.py from series.yaml (single owner);
# scripts/build_docs.py only materializes content/ -> docs/ files and does not touch nav.
# The entries below are placeholders for the scaffold phase (Phase 4) and are not
# expected to build until Phase 6 file moves populate content/ and docs/.
nav:
  - Home: index.md
  - Korean:
      - ko/index.md
  - English:
      - en/index.md
